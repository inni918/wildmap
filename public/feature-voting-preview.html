<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>Feature Voting - 方案Y</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f5f5f0; min-height: 100vh; }

.header {
  background: white; padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #e5e7eb;
  position: sticky; top: 0; z-index: 10;
}
.back-btn { color: #2D6A4F; font-size: 18px; }
.spot-name { font-weight: 700; font-size: 16px; }

.spot-detail { background: white; }
.features-section { padding: 16px 16px 12px; border-bottom: 1px solid #f0f0f0; }
.section-title { font-size: 12px; font-weight: 600; color: #9ca3af; margin-bottom: 14px; letter-spacing: 0.06em; text-transform: uppercase; }

.icon-grid { display: flex; flex-wrap: wrap; gap: 18px 22px; padding: 0 2px; }
.icon-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.15s; }
.icon-item:active { transform: scale(0.88); }
.icon-item svg { width: 30px; height: 30px; }

/* 確認：飽和色 */
.col-fac         { color: #2D6A4F; }
.col-camp        { color: #d97706; }
.col-env         { color: #388e3c; }
.col-act         { color: #1565c0; }
.col-res         { color: #7b1fa2; }
.col-warn        { color: #c62828; }

/* 待確認：同色系但 30% 透明度 */
.col-fac-dim     { color: #2D6A4F55; }
.col-camp-dim    { color: #d9770655; }
.col-env-dim     { color: #388e3c55; }
.col-act-dim     { color: #1565c055; }
.col-res-dim     { color: #7b1fa255; }
.col-warn-dim    { color: #c6282855; }

.view-all-btn {
  margin-top: 14px; width: 100%;
  padding: 9px; border-radius: 10px;
  border: 1.5px dashed #d1d5db;
  background: transparent; cursor: pointer;
  font-size: 12px; color: #9ca3af; font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}

/* Overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; }
.overlay.show { display: block; }

/* Bottom Sheet */
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: white; border-radius: 24px 24px 0 0;
  max-height: 82vh; overflow-y: auto;
  display: none;
  animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.bottom-sheet.show { display: block; }

.sheet-handle { width: 36px; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 12px auto 0; }
.sheet-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 4px; }
.sheet-title { font-size: 17px; font-weight: 700; }
.help-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: #f3f4f6; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #6b7280;
}

.help-tooltip {
  display: none; margin: 0 20px 8px;
  background: #f8fafc; border-radius: 12px;
  padding: 12px 14px; border: 1px solid #e5e7eb;
}
.help-tooltip.show { display: block; }
.help-tooltip p { font-size: 12px; color: #6b7280; line-height: 1.8; }
.help-tooltip strong { color: #374151; }

.category-group { padding: 8px 20px 4px; }
.category-label {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 8px 0 6px; border-bottom: 1px solid #f0f0f0; margin-bottom: 2px;
}
.cat-dot { width: 7px; height: 7px; border-radius: 50%; }

.vote-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
.vote-icon { width: 28px; height: 28px; flex-shrink: 0; }
.vote-icon svg { width: 28px; height: 28px; }
.vote-text { flex: 1; }
.vote-name { font-size: 14px; font-weight: 600; color: #111; }
.vote-name.dim { color: #9ca3af; }
.vote-status { font-size: 11px; margin-top: 1px; }
.vote-status.confirmed { color: #2D6A4F; font-weight: 600; }
.vote-status.pending-s { color: #9ca3af; }

.vote-btns { display: flex; gap: 5px; }
.vote-btn {
  display: flex; align-items: center; gap: 3px;
  padding: 5px 9px; border-radius: 20px;
  border: 1.5px solid #e5e7eb; background: white; cursor: pointer;
  font-size: 12px; font-weight: 600; color: #9ca3af; transition: all 0.15s;
}
.vote-btn:active { transform: scale(0.93); }
.vote-btn.up.active   { background: #e6f4ef; border-color: #2D6A4F; color: #2D6A4F; }
.vote-btn.down.active { background: #fce4ec; border-color: #c62828; color: #c62828; }
.vote-btn svg { width: 12px; height: 12px; }

.add-feature-btn {
  margin: 10px 20px 24px; width: calc(100% - 40px);
  padding: 12px; border-radius: 14px;
  border: 1.5px dashed #2D6A4F; background: #f0f9f5; cursor: pointer;
  font-size: 13px; color: #2D6A4F; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
</style>
</head>
<body>

<div class="header">
  <span class="back-btn">←</span>
  <span class="spot-name">松嶺露營區</span>
</div>

<div class="spot-detail">
  <div class="features-section">
    <div class="section-title">特性</div>
    <div class="icon-grid">
      <!-- 確認：設施與服務（飽和綠） -->
      <div class="icon-item col-fac" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9C1 5.13 4.13 2 8 2s7 3.13 7 7-3.13 7-7 7-7-3.13-7-7zm9.29-1.29L8 5.41 5.71 7.71 7 9l1-1 2.29 2.29 1.42-1.42-1.42-1.16zM23 2h-4v2h1v14h-1v2h4v-2h-1V4h1V2z"/></svg>
      </div>
      <div class="icon-item col-fac" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"/></svg>
      </div>
      <div class="icon-item col-fac" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 7.48 2 13v7h4v-7c0-3.31 2.69-6 6-6s6 2.69 6 6v7h4v-7c0-5.52-4.48-10-10-10z"/></svg>
      </div>
      <!-- 確認：營地特性（飽和橙） -->
      <div class="icon-item col-camp" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z"/></svg>
      </div>
      <div class="icon-item col-camp" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z"/></svg>
      </div>
      <!-- 確認：周邊環境（飽和草綠） -->
      <div class="icon-item col-env" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
      </div>
      <div class="icon-item col-env" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 6l-1-2H5v17h2v-7h5l1 2h7V6h-6zm4 8h-4l-1-2H7V6h5l1 2h5v6z"/></svg>
      </div>
      <!-- 確認：活動（飽和藍） -->
      <div class="icon-item col-act" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>
      </div>
      <!-- 待確認：設施（淡綠，同色系 30%） -->
      <div class="icon-item col-fac-dim" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
      </div>
      <!-- 待確認：環境（淡草綠） -->
      <div class="icon-item col-env-dim" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <!-- 待確認：活動（淡藍） -->
      <div class="icon-item col-act-dim" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </div>
    </div>
    <button class="view-all-btn" onclick="openSheet()">查看全部特性與投票</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-top">
    <div class="sheet-title">特性詳情與投票</div>
    <button class="help-btn" onclick="toggleHelp()">？</button>
  </div>
  <div class="help-tooltip" id="helpTooltip">
    <p>
      <strong>飽和色</strong> = 60% 以上用戶確認，且至少 3 票<br>
      <strong>淡色</strong> = 票數不足，或正反票接近（仍可看出類別）<br><br>
      <strong>👍</strong> = 我確認這裡有<br>
      <strong>👎</strong> = 我確認這裡沒有<br>
      再按一次可收回，只能選其中一種
    </p>
  </div>

  <div class="category-group">
    <div class="category-label">
      <div class="cat-dot" style="background:#2D6A4F"></div>
      <span style="color:#2D6A4F">設施與服務</span>
    </div>
    <div class="vote-row">
      <div class="vote-icon col-fac"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9C1 5.13 4.13 2 8 2s7 3.13 7 7-3.13 7-7 7-7-3.13-7-7zm9.29-1.29L8 5.41 5.71 7.71 7 9l1-1 2.29 2.29 1.42-1.42-1.42-1.16zM23 2h-4v2h1v14h-1v2h4v-2h-1V4h1V2z"/></svg></div>
      <div class="vote-text">
        <div class="vote-name">WiFi</div>
        <div class="vote-status confirmed">✓ 14 人確認</div>
      </div>
      <div class="vote-btns">
        <button class="vote-btn up active" onclick="toggleVote(this,'up')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>14</button>
        <button class="vote-btn down" onclick="toggleVote(this,'down')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>2</button>
      </div>
    </div>
    <div class="vote-row">
      <div class="vote-icon col-fac"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"/></svg></div>
      <div class="vote-text">
        <div class="vote-name">熱水</div>
        <div class="vote-status confirmed">✓ 11 人確認</div>
      </div>
      <div class="vote-btns">
        <button class="vote-btn up" onclick="toggleVote(this,'up')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>11</button>
        <button class="vote-btn down" onclick="toggleVote(this,'down')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>0</button>
      </div>
    </div>
    <!-- 待確認 -->
    <div class="vote-row">
      <div class="vote-icon col-fac-dim"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>
      <div class="vote-text">
        <div class="vote-name dim">停車場</div>
        <div class="vote-status pending-s">2 票（待確認）</div>
      </div>
      <div class="vote-btns">
        <button class="vote-btn up" onclick="toggleVote(this,'up')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>2</button>
        <button class="vote-btn down" onclick="toggleVote(this,'down')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>1</button>
      </div>
    </div>
  </div>

  <div class="category-group">
    <div class="category-label">
      <div class="cat-dot" style="background:#d97706"></div>
      <span style="color:#d97706">營地特性</span>
    </div>
    <div class="vote-row">
      <div class="vote-icon col-camp"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z"/></svg></div>
      <div class="vote-text">
        <div class="vote-name">寵物友善</div>
        <div class="vote-status confirmed">✓ 8 人確認</div>
      </div>
      <div class="vote-btns">
        <button class="vote-btn up" onclick="toggleVote(this,'up')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>8</button>
        <button class="vote-btn down" onclick="toggleVote(this,'down')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>1</button>
      </div>
    </div>
  </div>

  <button class="add-feature-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新增還沒有人投票的特性
  </button>
</div>

<script>
function openSheet() { document.getElementById('overlay').classList.add('show'); document.getElementById('sheet').classList.add('show'); }
function closeSheet() { document.getElementById('overlay').classList.remove('show'); document.getElementById('sheet').classList.remove('show'); document.getElementById('helpTooltip').classList.remove('show'); }
function toggleHelp() { document.getElementById('helpTooltip').classList.toggle('show'); }
function toggleVote(btn, dir) {
  event.stopPropagation();
  const row = btn.closest('.vote-btns');
  const upBtn = row.querySelector('.up'), downBtn = row.querySelector('.down');
  if (dir === 'up') { upBtn.classList.contains('active') ? upBtn.classList.remove('active') : (upBtn.classList.add('active'), downBtn.classList.remove('active')); }
  else { downBtn.classList.contains('active') ? downBtn.classList.remove('active') : (downBtn.classList.add('active'), upBtn.classList.remove('active')); }
}
</script>
</body>
</html>
