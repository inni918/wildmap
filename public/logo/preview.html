<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wildmap Logo Concepts</title>
<style>
  body { background: #FEFAF3; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; }
  h1 { color: #2D6A4F; text-align: center; font-size: 28px; margin-bottom: 10px; }
  .subtitle { text-align: center; color: #5C5C5C; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px; margin: 0 auto; }
  .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
  .card img { width: 180px; height: 180px; margin: 0 auto 16px; display: block; }
  .card h3 { color: #2D6A4F; margin: 0 0 8px; font-size: 18px; }
  .card p { color: #5C5C5C; font-size: 14px; margin: 0; line-height: 1.5; }
  .sizes { display: flex; gap: 16px; align-items: center; justify-content: center; margin-top: 16px; }
  .sizes img { margin: 0; }
  .tag { display: inline-block; background: #2D6A4F20; color: #2D6A4F; padding: 2px 10px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>🏕️ Wildmap Logo Concepts</h1>
  <p class="subtitle">簡約圖標 · 樹+帳篷 · 森林綠 #2D6A4F</p>
  <div class="grid">
    <div class="card">
      <img src="concept-a.svg" alt="Concept A">
      <h3>A. 圓形徽章</h3>
      <p>帳篷+松樹剪影在圓形綠底上<br>經典戶外品牌風格</p>
      <span class="tag">適合 App icon</span>
      <div class="sizes">
        <img src="concept-a.svg" width="64" height="64">
        <img src="concept-a.svg" width="32" height="32">
        <img src="concept-a.svg" width="16" height="16">
      </div>
    </div>
    <div class="card">
      <img src="concept-b.svg" alt="Concept B">
      <h3>B. 線條插畫</h3>
      <p>極簡線條松樹+帳篷輪廓<br>透明背景，適應各種底色</p>
      <span class="tag">適合 Header</span>
      <div class="sizes">
        <img src="concept-b.svg" width="64" height="64">
        <img src="concept-b.svg" width="32" height="32">
        <img src="concept-b.svg" width="16" height="16">
      </div>
    </div>
    <div class="card">
      <img src="concept-c.svg" alt="Concept C">
      <h3>C. 風景圖標</h3>
      <p>圓角方形+帳篷+松樹+山稜線+星星<br>豐富細節的夜晚露營場景</p>
      <span class="tag">適合 App icon + OG</span>
      <div class="sizes">
        <img src="concept-c.svg" width="64" height="64">
        <img src="concept-c.svg" width="32" height="32">
        <img src="concept-c.svg" width="16" height="16">
      </div>
    </div>
    <div class="card">
      <img src="concept-d.svg" alt="Concept D">
      <h3>D. 地圖圖釘</h3>
      <p>帳篷+樹藏在地圖圖釘裡<br>直覺聯想「地圖上的露營地」</p>
      <span class="tag">最有品牌辨識度</span>
      <div class="sizes">
        <img src="concept-d.svg" width="64" height="64">
        <img src="concept-d.svg" width="32" height="32">
        <img src="concept-d.svg" width="16" height="16">
      </div>
    </div>
  </div>
</body>
</html>
