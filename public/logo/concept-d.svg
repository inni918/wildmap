<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- 概念 D：地圖圖釘造型 + 帳篷在裡面，最有「地圖」感 -->
  
  <!-- 圖釘外框 -->
  <path d="M256 480 L256 480 C256 480 100 300 100 200 C100 114 170 44 256 44 C342 44 412 114 412 200 C412 300 256 480 256 480 Z" fill="#2D6A4F"/>
  
  <!-- 圖釘內圓 -->
  <circle cx="256" cy="195" r="120" fill="#FEFAF3"/>
  
  <!-- 帳篷（圖釘裡面） -->
  <path d="M256 120 L195 280 L317 280 Z" fill="#2D6A4F"/>
  <!-- 帳篷門 -->
  <path d="M256 195 L240 280 L272 280 Z" fill="#52B788"/>
  
  <!-- 左樹 -->
  <path d="M168 280 L168 230 M168 260 L150 275 M168 245 L148 262 M168 230 L153 247 M168 260 L186 275 M168 245 L188 262 M168 230 L183 247" stroke="#52B788" stroke-width="5" stroke-linecap="round"/>
  
  <!-- 右樹（小） -->
  <path d="M340 280 L340 245 M340 268 L326 278 M340 255 L328 265 M340 268 L354 278 M340 255 L352 265" stroke="#52B788" stroke-width="4" stroke-linecap="round"/>
</svg>