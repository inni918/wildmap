<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- 概念 C：圓角方形背景 + 帳篷剪影 + 兩棵松樹 + 山稜線 -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#2D6A4F"/>
  
  <!-- 遠山（背景裝飾） -->
  <path d="M16 320 L130 220 L200 280 L300 190 L400 260 L496 200 L496 496 L16 496 Z" fill="#1B4332" opacity="0.3"/>
  
  <!-- 帳篷（主體） -->
  <path d="M256 130 L150 370 L362 370 Z" fill="#FEFAF3"/>
  <!-- 帳篷門 -->
  <path d="M256 240 L228 370 L284 370 Z" fill="#52B788"/>
  
  <!-- 左松樹 -->
  <g transform="translate(85, 0)">
    <rect x="-4" y="280" width="8" height="90" fill="#52B788"/>
    <path d="M0 190 L-30 280 L30 280 Z" fill="#52B788"/>
    <path d="M0 220 L-24 280 L24 280 Z" fill="#52B788"/>
  </g>
  
  <!-- 右松樹（較小） -->
  <g transform="translate(420, 40)">
    <rect x="-3" y="250" width="6" height="80" fill="#52B788" opacity="0.8"/>
    <path d="M0 200 L-20 260 L20 260 Z" fill="#52B788" opacity="0.8"/>
    <path d="M0 220 L-16 260 L16 260 Z" fill="#52B788" opacity="0.8"/>
  </g>
  
  <!-- 星星裝飾 -->
  <circle cx="380" cy="100" r="3" fill="#FEFAF3" opacity="0.6"/>
  <circle cx="140" cy="130" r="2" fill="#FEFAF3" opacity="0.4"/>
  <circle cx="430" cy="150" r="2.5" fill="#FEFAF3" opacity="0.5"/>
</svg>