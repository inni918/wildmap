<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon 版本對比 — 設施與服務</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f9fafb; padding: 32px; color: #111; }
  h1 { font-size: 20px; font-weight: 700; color: #2D6A4F; margin-bottom: 6px; }
  p { font-size: 13px; color: #6b7280; margin-bottom: 32px; }
  
  .compare-grid {
    display: grid;
    grid-template-columns: 180px repeat(2, 1fr);
    gap: 0;
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);
  }
  
  .header-row {
    display: contents;
  }
  .header-cell {
    padding: 14px 16px;
    font-size: 12px;
    font-weight: 700;
    background: #2D6A4F;
    color: white;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  
  .row {
    display: contents;
  }
  .row > div {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .row:last-child > div { border-bottom: none; }
  .row:nth-child(even) > div { background: #fafafa; }
  
  .label-cell {
    font-size: 13px;
    font-weight: 500;
    color: #374151;
  }
  .label-cell .key { font-size: 10px; color: #9ca3af; display: block; margin-top: 2px; font-family: monospace; }
  
  .icon-cell {
    gap: 16px;
  }
  .icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .icon-wrap svg { width: 36px; height: 36px; color: #2D6A4F; }
  .icon-wrap .size-label { font-size: 9px; color: #9ca3af; }
  
  .version-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 99px;
    margin-bottom: 8px;
  }
  .v1 { background: #FEF3C7; color: #92400E; }
  .v2 { background: #D1FAE5; color: #065F46; }
  
  .col-header {
    display: flex;
    flex-direction: column;
  }
</style>
</head>
<body>

<h1>Icon 版本對比 — 設施與服務</h1>
<p>左欄：舊版（現有獨立 SVG 檔案）｜右欄：新版（WikiCamps outline 風格重設計）</p>

<div class="compare-grid">
  <!-- Header -->
  <div class="header-cell">特性名稱</div>
  <div class="header-cell">舊版 SVG</div>
  <div class="header-cell">新版（WikiCamps 風格）</div>

  <!-- 1. tap_water -->
  <div class="label-cell">自來水<span class="key">tap_water</span></div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 舊版：沒有獨立 SVG，使用 FA 替代 -->
      <path d="M12 2v4M8 6h8M7 10h10l-1 8H8l-1-8zM10 18v2M14 18v2"/>
    </svg>
  </div>
  <div class="icon-cell">
    <!-- 新版 WikiCamps 風格水龍頭 -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h7"/>
      <path d="M12 8v8"/>
      <path d="M12 10c2 0 5 1 5 4s-3 4-5 4"/>
      <path d="M9 20c0-1.5.5-2.5 1.5-3"/>
      <path d="M5 9v6"/>
      <circle cx="5" cy="12" r="1" fill="currentColor"/>
      <path d="M14 12h2v-2h2v2"/>
    </svg>
  </div>

  <!-- shower -->
  <div class="label-cell">淋浴間<span class="key">shower</span></div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h3v3"/>
      <path d="M7 4c4 0 7 3 7 7"/>
      <circle cx="14" cy="11" r="2"/>
      <path d="M12 15l1-2M14 15l0-2M16 15l-1-2"/>
    </svg>
  </div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="7" r="3"/>
      <path d="M9 16l1-2M12 16v-2M15 16l-1-2"/>
      <path d="M8 18l1-2M11 18.5v-2M14 18.5l-1-2M17 18l-1-2"/>
      <path d="M7 10h10"/>
    </svg>
  </div>

  <!-- flush_toilet -->
  <div class="label-cell">沖水馬桶<span class="key">flush_toilet</span></div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h12v5a6 6 0 0 1-12 0V3z"/>
      <path d="M10 15v4h4v-4M8 21h8M15 3v2"/>
    </svg>
  </div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="2" width="8" height="4" rx="1"/>
      <path d="M7 6h10c0 4-2 6-5 6S7 10 7 6z"/>
      <path d="M9 12v4h6v-4"/>
      <path d="M7 20h10"/>
      <path d="M16 4h1a1 1 0 0 1 1 1v1"/>
    </svg>
  </div>

  <!-- wifi -->
  <div class="label-cell">WiFi<span class="key">wifi</span></div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 8.5c3.5-3.5 6.5-5 10-5s6.5 1.5 10 5"/>
      <path d="M5 12c2.5-2.5 4.5-3.5 7-3.5s4.5 1 7 3.5"/>
      <path d="M8.5 15.5c1.5-1.5 2.5-2 3.5-2s2 .5 3.5 2"/>
      <circle cx="12" cy="19" r="1" fill="currentColor"/>
    </svg>
  </div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7.5C6 4.5 9 3 12 3s6 1.5 9 4.5"/>
      <path d="M6 11c1.8-1.8 3.6-2.8 6-2.8s4.2 1 6 2.8"/>
      <path d="M9 14.5c.9-.9 1.8-1.5 3-1.5s2.1.6 3 1.5"/>
      <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
    </svg>
  </div>

  <!-- washing_machine -->
  <div class="label-cell">洗衣機<span class="key">washing_machine</span></div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="12" cy="13" r="4"/>
      <circle cx="12" cy="13" r="2"/>
      <circle cx="7" cy="7" r="1" fill="currentColor"/>
      <circle cx="10" cy="7" r="1" fill="currentColor"/>
    </svg>
  </div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="2" width="18" height="20" rx="2"/>
      <circle cx="12" cy="13" r="5"/>
      <circle cx="12" cy="13" r="2"/>
      <line x1="6" y1="6" x2="8" y2="6"/>
      <circle cx="11" cy="6" r="1" fill="currentColor"/>
      <circle cx="14" cy="6" r="1" fill="currentColor"/>
    </svg>
  </div>

  <!-- refrigerator -->
  <div class="label-cell">冰箱<span class="key">refrigerator</span></div>
  <div class="icon-cell">
    <!-- 舊版沒有單獨 SVG -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="2" width="16" height="20" rx="2"/>
      <line x1="4" y1="10" x2="20" y2="10"/>
      <line x1="8" y1="6" x2="8" y2="8"/>
      <line x1="8" y1="14" x2="8" y2="18"/>
    </svg>
  </div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <line x1="5" y1="9" x2="19" y2="9"/>
      <line x1="9" y1="5.5" x2="9" y2="7.5"/>
      <line x1="9" y1="13" x2="9" y2="17"/>
    </svg>
  </div>

  <!-- trash_bin -->
  <div class="label-cell">垃圾桶<span class="key">trash_bin</span></div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6"/>
    </svg>
  </div>
  <div class="icon-cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18"/>
      <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <line x1="10" y1="11" x2="10" y2="17"/>
      <line x1="14" y1="11" x2="14" y2="17"/>
    </svg>
  </div>

</div>

<div style="margin-top:24px;font-size:12px;color:#9ca3af;">
  左欄舊版部分使用暫代 SVG（原版使用 FontAwesome）。右欄為最新 WikiCamps 風格重設計版本。
</div>

</body>
</html>
