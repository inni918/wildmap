<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>Bottom Sheet v6 — 特性列</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #e8f4f0; height: 100vh; position: relative; overflow: hidden; }

.map-bg { position: absolute; inset: 0; }
.map-img {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #d4e8d4 0%, #e8f0d8 30%, #f0e8d0 60%, #d8e8f0 100%);
}
.map-img::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(#c8d8b8 1px, transparent 1px), linear-gradient(90deg, #c8d8b8 1px, transparent 1px);
  background-size: 60px 60px; opacity: 0.3;
}

.header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  background: white; padding: 12px 16px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #e5e7eb;
}
.logo { width: 28px; height: 28px; background: #2D6A4F; border-radius: 6px; display:flex; align-items:center; justify-content:center; color:white; font-size:14px; }
.header-title { font-weight: 700; font-size: 16px; }
.header-right { margin-left: auto; background: #2D6A4F; color: white; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; }

/* 卡片 */
.bottom-sheet {
  position: absolute; z-index: 20;
  left: 50%; transform: translateX(-50%);
  width: calc(100% - 48px); max-width: 420px;
  bottom: 80px;
  background: white; border-radius: 20px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.18);
  overflow: hidden;
  animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slideUp { from { transform: translateX(-50%) translateY(100%); } to { transform: translateX(-50%) translateY(0); } }

/* 拖曳把手 */
.drag-handle {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 32px; height: 3px; background: rgba(255,255,255,0.5); border-radius: 2px; z-index: 5;
}

/* 照片 */
.photo-banner { width: 100%; height: 120px; position: relative; overflow: hidden; }
.photo-banner img { width: 100%; height: 100%; object-fit: cover; }
.fav-btn {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.32); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer; font-size: 15px;
}
.nav-btn {
  position: absolute; bottom: 10px; right: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.32); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer;
}
.category-badge {
  position: absolute; bottom: 10px; left: 10px;
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  background: rgba(45,106,79,0.88); color: white;
}

/* 資訊區 */
.card-info { padding: 10px 14px 0; }
.spot-name { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 5px; }
.meta-row { display: flex; align-items: center; gap: 6px; }
.rating-num-big { font-size: 15px; font-weight: 800; color: #111; }
.star-icon { color: #f59e0b; font-size: 13px; }
.rating-count { font-size: 11px; color: #9ca3af; }
.dot { color: #d1d5db; font-size: 10px; }
.region { font-size: 12px; color: #6b7280; }
.shield { display: inline-flex; align-items: center; color: #15803d; }

/* 特性橫向捲動列 */
.features-row {
  margin-top: 10px;
  padding: 8px 14px 12px;
  border-top: 1px solid #f3f4f6;
  overflow-x: auto;
  display: flex; gap: 10px; align-items: center;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.features-row::-webkit-scrollbar { display: none; }
.feat-icon {
  flex-shrink: 0;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
}
.feat-icon svg { width: 20px; height: 20px; }

/* 分類顏色 */
.col-fac  { color: #2D6A4F; }
.col-camp { color: #d97706; }
.col-env  { color: #388e3c; }
.col-act  { color: #1565c0; }
/* 待確認淡版 */
.col-fac-dim  { color: rgba(45,106,79,0.35); }
.col-camp-dim { color: rgba(217,119,6,0.35); }
.col-env-dim  { color: rgba(56,142,60,0.35); }

/* 示範切換 */
.demo-btns {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 25;
}
.demo-btn {
  background: white; border: none; padding: 6px 10px; border-radius: 20px;
  font-size: 11px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  color: #374151; font-weight: 600; white-space: nowrap;
}
.demo-btn.active { background: #2D6A4F; color: white; }
</style>
</head>

  <span class="header-title">Wildmap</span>
